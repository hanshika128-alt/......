<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Axam & Hanshika · Forever Promise</title>
  <!-- Google Fonts: Cursive for titles, Serif for body -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #fff0f5 0%, #ffe0e8 100%);
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* floating hearts canvas */
    #hearts-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* main card container */
    .screen-container {
      max-width: 680px;
      width: 100%;
      background: rgba(255, 250, 245, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      box-shadow: 0 30px 50px rgba(255, 77, 109, 0.15), 0 10px 25px rgba(0,0,0,0.05);
      padding: 2.2rem 2rem 2.5rem;
      text-align: center;
      transition: all 0.35s ease;
      border: 1px solid rgba(255, 215, 180, 0.6);
      z-index: 2;
      position: relative;
    }

    /* fade transitions */
    .fade-out {
      opacity: 0;
      transform: scale(0.97);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .fade-in {
      animation: gentleFade 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes gentleFade {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* typography */
    h1, .proposal-text, .certificate-title {
      font-family: 'Great Vibes', cursive;
      font-weight: normal;
      color: #b23b4b;
    }

    .proposal-text {
      font-size: 2.8rem;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .vows-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      line-height: 1.5;
      color: #3e2a2f;
      background: #fffaf7;
      padding: 1.5rem;
      border-radius: 32px;
      border-left: 5px solid #e4b363;
      margin: 20px 0;
      text-align: left;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      padding: 14px 20px;
      font-size: 1.05rem;
      border-radius: 48px;
      border: 1px solid #f2c1cd;
      background: white;
      font-family: 'Cormorant Garamond', serif;
      margin: 8px 0;
      outline: none;
      transition: 0.2s;
    }

    textarea {
      border-radius: 28px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: #ff7b8f;
      box-shadow: 0 0 0 3px rgba(255, 77, 109, 0.2);
    }

    button {
      background: #ff4d6d;
      border: none;
      padding: 12px 36px;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(255, 77, 109, 0.3);
      transition: 0.2s;
      margin-top: 20px;
      letter-spacing: 1px;
    }

    button:hover {
      background: #e63e5e;
      transform: scale(1.02);
    }

    .decision-buttons {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin: 30px 0 15px;
      flex-wrap: wrap;
    }

    .btn-yes {
      background: #ff4d6d;
      box-shadow: 0 6px 14px rgba(255, 77, 109, 0.4);
    }

    .btn-no {
      background: #a99ba0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .heart-broken {
      font-size: 5.5rem;
      display: inline-block;
      animation: shakeCrack 0.5s ease-in-out;
      margin: 20px 0;
    }

    @keyframes shakeCrack {
      0% { transform: scale(1) rotate(0deg); opacity: 1; }
      25% { transform: scale(1.3) rotate(10deg); }
      50% { transform: scale(1.1) rotate(-8deg); }
      75% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 0; visibility: hidden; }
    }

    .warning-text {
      font-size: 1.4rem;
      font-weight: bold;
      color: #b13e54;
      margin-top: 15px;
      font-family: 'Cormorant Garamond', serif;
      animation: fadeText 0.5s ease;
    }

    @keyframes fadeText {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* certificate premium style */
    .certificate-card {
      background: #ffffff;
      border: 2px solid #e4b363;
      border-radius: 32px;
      padding: 2rem 1.5rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.1);
      position: relative;
    }

    .certificate-card h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.8rem;
      color: #b8860b;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .certificate-card .cert-date {
      font-size: 1.2rem;
      margin: 15px 0 5px;
      letter-spacing: 1px;
    }

    .certificate-card .couple-name {
      font-size: 2rem;
      font-weight: 700;
      margin: 15px 0;
      color: #a5384b;
    }

    .certificate-card .forever-line {
      font-size: 1.25rem;
      margin: 20px 0 5px;
    }

    .kiss-rain {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 25px;
      font-size: 1.7rem;
      animation: popKisses 0.6s ease-out;
    }

    @keyframes popKisses {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    footer {
      font-size: 0.7rem;
      margin-top: 20px;
      color: #c48a9b;
    }

    .hidden {
      display: none;
    }

    /* gold accent for buttons */
    .gold-border {
      border-bottom: 2px solid #e4b363;
      display: inline-block;
      padding-bottom: 5px;
    }

    @media (max-width: 550px) {
      .screen-container { padding: 1.5rem; }
      .proposal-text { font-size: 2rem; }
      .vows-text { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<canvas id="hearts-canvas"></canvas>
<div id="appRoot"></div>

<script>
  // ========== FLOATING HEARTS BACKGROUND ==========
  const canvas = document.getElementById('hearts-canvas');
  let ctx = canvas.getContext('2d');
  let hearts = [];
  let animFrame;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  class FloatingHeart {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 18 + 10;
      this.speedY = Math.random() * 0.5 + 0.2;
      this.opacity = Math.random() * 0.4 + 0.2;
    }
    update() {
      this.y -= this.speedY;
      if (this.y < -40) {
        this.y = canvas.height + 30;
        this.x = Math.random() * canvas.width;
      }
    }
    draw() {
      if (!ctx) return;
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.font = `${this.size}px "Segoe UI", "Arial"`;
      ctx.fillStyle = "#ff8da1";
      ctx.fillText("❤️", this.x, this.y);
      ctx.fillText("💖", this.x + 3, this.y - 2);
      ctx.restore();
    }
  }

  function initHearts(count = 45) {
    hearts = [];
    for (let i = 0; i < count; i++) hearts.push(new FloatingHeart());
  }

  function animateHearts() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let h of hearts) {
      h.update();
      h.draw();
    }
    animFrame = requestAnimationFrame(animateHearts);
  }

  resizeCanvas();
  initHearts(50);
  animateHearts();
  window.addEventListener('resize', () => {
    resizeCanvas();
    initHearts(50);
  });

  // ========== SCREEN MANAGEMENT ==========
  let currentStep = 1; // 1: proposal, 2: vows+answer, 3: decision buttons, 4: (no handled inside), 5: ready for certificate, 6: final certificate
  let answerSubmitted = false; // track if we already moved to decision step
  const app = document.getElementById('appRoot');

  // Helper to change screens with fade
  function transitionTo(newHTML, afterRenderCallback) {
    if (!app) return;
    app.classList.add('fade-out');
    setTimeout(() => {
      app.innerHTML = newHTML;
      app.classList.remove('fade-out');
      app.classList.add('fade-in');
      setTimeout(() => app.classList.remove('fade-in'), 500);
      if (afterRenderCallback) afterRenderCallback();
    }, 220);
  }

  // Step 1: Proposal screen
  function renderStep1() {
    const html = `
      <div class="screen-container">
        <div class="proposal-text">Will you marry me my Axam?</div>
        <button id="continueBtn">Continue</button>
        <footer>✨ a journey of love ✨</footer>
      </div>
    `;
    transitionTo(html, () => {
      document.getElementById('continueBtn')?.addEventListener('click', () => {
        renderStep2();
      });
    });
  }

  // Step 2: Vows + answer input (with Netlify form)
  function renderStep2() {
    const html = `
      <div class="screen-container">
        <div class="vows-text">
          Axam, do you take Hanshika to be your wedded wife, Do you promise to love and cherish her to comfort her honor and keep her in sickness and in health, and forsaking all others, be faithful to her as long as you both shall live?
        </div>
        <form id="proposalForm" name="proposal-response" method="POST" data-netlify="true" netlify>
          <input type="hidden" name="form-name" value="proposal-response" />
          <input type="text" name="name" placeholder="Your name (optional)" style="margin-bottom:6px;" />
          <textarea name="answer" rows="3" placeholder="Write your answer here…" required></textarea>
          <button type="submit" id="submitAnswerBtn">Submit answer</button>
        </form>
        <footer>💌 Your answer will be sent to Hanshika's heart</footer>
      </div>
    `;
    transitionTo(html, () => {
      const form = document.getElementById('proposalForm');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const answerField = form.querySelector('textarea[name="answer"]');
          if (!answerField.value.trim()) {
            alert("Please write your answer before submitting.");
            return;
          }
          // Submit to Netlify Forms (asynchronous, no page reload)
          const formData = new FormData(form);
          fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams(formData).toString()
          }).catch(err => console.log("Netlify form error (still works locally):", err));
          
          // After submission, move to decision buttons (Step 3)
          renderStep3();
        });
      }
    });
  }

  // Step 3: Two buttons "Yes, I do" and "No, I don't"
  function renderStep3() {
    const html = `
      <div class="screen-container" id="decisionContainer">
        <div id="dynamicZone"></div>
        <div class="decision-buttons" id="decisionWrapper">
          <button class="btn-yes" id="yesBtn">Yes, I do</button>
          <button class="btn-no" id="noBtn">No, I don't</button>
        </div>
      </div>
    `;
    transitionTo(html, () => {
      const yesBtn = document.getElementById('yesBtn');
      const noBtn = document.getElementById('noBtn');
      const dynamicZone = document.getElementById('dynamicZone');
      
      // Yes handler
      yesBtn?.addEventListener('click', () => {
        renderStep5(); // ready for certificate screen
      });
      
      // No handler: playful pressure effect
      noBtn?.addEventListener('click', () => {
        // Show broken heart with animation
        dynamicZone.innerHTML = `
          <div class="heart-broken" id="brokenHeart">💔</div>
        `;
        const heartDiv = document.getElementById('brokenHeart');
        if (heartDiv) {
          // after animation ends (0.5s) remove broken heart and show "You better think again"
          setTimeout(() => {
            heartDiv.style.display = 'none';
            dynamicZone.innerHTML = `<div class="warning-text">You better think again</div>`;
            // Remove the "No, I don't" button
            const noButton = document.getElementById('noBtn');
            if (noButton) noButton.style.display = 'none';
          }, 500);
        } else {
          // fallback
          dynamicZone.innerHTML = `<div class="warning-text">You better think again</div>`;
          const noButton = document.getElementById('noBtn');
          if (noButton) noButton.style.display = 'none';
        }
      });
    });
  }

  // Step 5: "ready for your marriage certificate?" with Yes button
  function renderStep5() {
    const html = `
      <div class="screen-container">
        <div style="font-size:2.2rem; margin-bottom:15px;">💍</div>
        <p style="font-size:1.6rem; font-weight:500;">ready for your marriage certificate?</p>
        <button id="certificateYesBtn">Yes</button>
      </div>
    `;
    transitionTo(html, () => {
      document.getElementById('certificateYesBtn')?.addEventListener('click', () => {
        renderStep6();
      });
    });
  }

  // Step 6: Final certificate with gold border, exact text, and many kisses pop out
  function renderStep6() {
    const html = `
      <div class="screen-container certificate-card">
        <h2>Certificate of Marriage</h2>
        <div class="cert-date">This certifies on 3 September 2025</div>
        <div class="couple-name">Hanshika & Axam</div>
        <div class="forever-line">Forever together United in marriage ❤️</div>
        <div id="kissesContainer" class="kiss-rain"></div>
        <footer>sealed with love</footer>
      </div>
    `;
    transitionTo(html, () => {
      // After certificate appears, pop out many kisses
      const kissesDiv = document.getElementById('kissesContainer');
      if (kissesDiv) {
        // create many kiss emojis (💋)
        let kissesHtml = '';
        for (let i = 0; i < 55; i++) {
          kissesHtml += '💋 ';
        }
        kissesDiv.innerHTML = kissesHtml;
        // Add slight additional animation for pop effect
        kissesDiv.style.animation = 'popKisses 0.5s ease-out';
      }
    });
  }

  // Start the flow
  renderStep1();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Axam & Hanshika · A Forever Promise 💍</title>
  <!-- Google Fonts + Simple CSS Reset -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* slight polish, but text input stays selectable */
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #fff5f7 0%, #ffe4ed 100%);
      font-family: 'Quicksand', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* floating hearts canvas (background) */
    #hearts-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* main container */
    .screen-container {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(2px);
      border-radius: 56px;
      box-shadow: 0 25px 45px rgba(255, 77, 109, 0.2), 0 10px 20px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.8);
      padding: 2rem 2rem 2.5rem;
      text-align: center;
      transition: all 0.35s ease;
      border: 1px solid rgba(255, 215, 200, 0.7);
      z-index: 2;
      position: relative;
    }

    /* fade transition utility */
    .fade-out {
      opacity: 0;
      transform: scale(0.97);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }

    .fade-in {
      animation: gentleFade 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes gentleFade {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    h1, h2, .proposal-text, .vows-text {
      font-family: 'Playfair Display', serif;
      color: #9e2b3a;
    }

    .gold-text {
      background: linear-gradient(135deg, #c7a252, #e3c87b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .proposal-text {
      font-size: 2.3rem;
      font-weight: 700;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
      color: #b23b4b;
    }

    .vows-card {
      background: #fff9fb;
      padding: 1.8rem;
      border-radius: 40px;
      border-left: 6px solid #ffb7c5;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
      font-size: 1.25rem;
      line-height: 1.5;
      margin: 20px 0;
    }

    button {
      background: #ff7b8f;
      border: none;
      padding: 14px 34px;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'Quicksand', sans-serif;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 14px rgba(255, 77, 109, 0.3);
      transition: 0.2s;
      margin-top: 20px;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: #ff5c74;
      transform: scale(1.02);
      box-shadow: 0 10px 18px rgba(255, 77, 109, 0.4);
    }

    input, textarea {
      width: 100%;
      padding: 14px 20px;
      font-size: 1rem;
      border-radius: 48px;
      border: 1px solid #ffcdd8;
      background: white;
      font-family: 'Quicksand', sans-serif;
      resize: vertical;
      margin: 10px 0;
      transition: 0.2s;
      outline: none;
    }

    textarea:focus, input:focus {
      border-color: #ff7b8f;
      box-shadow: 0 0 0 3px rgba(255, 123, 143, 0.2);
    }

    .decision-buttons {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin: 30px 0 10px;
      flex-wrap: wrap;
    }

    .btn-yes {
      background: #bf6f6f;
      background: linear-gradient(95deg, #dd7a8a, #c95c6e);
    }
    .btn-no {
      background: #b1a0a5;
      box-shadow: 0 5px 12px rgba(0,0,0,0.1);
    }
    .heart-broken-animation {
      font-size: 5rem;
      display: inline-block;
      animation: shakeBroken 0.6s ease-in-out;
      margin-bottom: 15px;
    }
    @keyframes shakeBroken {
      0% { transform: scale(1) rotate(0deg); opacity: 1; }
      30% { transform: scale(1.4) rotate(15deg); }
      60% { transform: scale(1.1) rotate(-8deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .warning-text {
      font-size: 1.3rem;
      font-weight: bold;
      color: #b14558;
      margin-top: 12px;
    }
    .certificate {
      background: #fffdf7;
      border: 2px solid #ecca9c;
      border-radius: 32px;
      padding: 1.8rem;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
      position: relative;
    }
    .certificate h2 {
      font-size: 2.3rem;
      letter-spacing: 3px;
      border-bottom: 2px dashed #ecca9c;
      display: inline-block;
      padding-bottom: 8px;
    }
    .certificate p {
      font-size: 1.2rem;
      margin: 18px 0;
    }
    .seal {
      font-size: 3rem;
      margin: 20px 0 5px;
      animation: stampPop 0.5s ease-out;
    }
    @keyframes stampPop {
      0% { transform: scale(0.2) rotate(-20deg); opacity: 0; }
      80% { transform: scale(1.2) rotate(3deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .kiss-rain {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 25px;
      font-size: 1.8rem;
    }
    .hidden {
      display: none;
    }
    .music-note {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,245,240,0.85);
      border-radius: 40px;
      padding: 8px 14px;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
      cursor: pointer;
      z-index: 10;
      font-weight: 500;
      border: 1px solid #ffb7c5;
      color: #b14558;
    }
    footer {
      font-size: 0.7rem;
      margin-top: 20px;
      color: #d49aa8;
    }
    @media (max-width: 500px) {
      .screen-container { padding: 1.5rem; }
      .proposal-text { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<canvas id="hearts-canvas"></canvas>
<div class="music-note" id="musicToggle">🎵 Melody On ♪</div>

<!-- MAIN APP: dynamic screens will be injected here -->
<div id="appRoot"></div>

<script>
  // ---------- ROMANTIC BACKGROUND HEARTS (floating) ----------
  const canvas = document.getElementById('hearts-canvas');
  let ctx = canvas.getContext('2d');
  let heartsArray = [];
  let animationId = null;
  let heartsEnabled = true;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  
  class FloatingHeart {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 18 + 8;
      this.speedY = Math.random() * 0.8 + 0.3;
      this.opacity = Math.random() * 0.5 + 0.2;
      this.angle = Math.random() * Math.PI * 2;
    }
    update() {
      this.y -= this.speedY;
      this.x += Math.sin(this.angle) * 0.2;
      if (this.y < -30) {
        this.y = canvas.height + 20;
        this.x = Math.random() * canvas.width;
      }
      if (this.x > canvas.width + 30) this.x = -30;
      if (this.x < -30) this.x = canvas.width + 30;
    }
    draw() {
      if (!ctx) return;
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.font = `${this.size}px "Segoe UI", "Arial", sans-serif`;
      ctx.fillStyle = "#ff99aa";
      ctx.fillText("❤️", this.x, this.y);
      ctx.restore();
    }
  }

  function initHearts(count = 45) {
    heartsArray = [];
    for (let i = 0; i < count; i++) {
      heartsArray.push(new FloatingHeart());
    }
  }
  function animateHearts() {
    if (!heartsEnabled) return;
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let heart of heartsArray) {
      heart.update();
      heart.draw();
    }
    animationId = requestAnimationFrame(animateHearts);
  }
  function startHearts() {
    if (animationId) cancelAnimationFrame(animationId);
    resizeCanvas();
    initHearts(50);
    animateHearts();
  }
  startHearts();
  window.addEventListener('resize', () => {
    resizeCanvas();
    initHearts(50);
  });

  // ---------- AUDIO (gentle romantic piano loop) ----------
  let audio = null;
  let audioEnabled = true;
  let audioCtxInitialized = false;
  // create audio only after first user interaction? but we'll create on page load muted & play on toggle / start
  function initAudio() {
    if (audio) return;
    audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); // royalty-free test track, but replaced with reliable romantic instrumental? Actually better to use a gentle royalty-free from my server? I'll embed a public domain inspired track? I'll use a stable instrumental from assets? to ensure cross-origin? we use a known sample that works (creative commons). But best: use a local sine? no, I'll embed a nice reliable piano loop from a free source (pixabay? risk). I'll use a simple silent fallback? Actually I provide a known 'Carefree' melody URL that works. Use a URL that is likely CORS-friendly and exists: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_1c5b5f5b0c.mp3"? unreliable. I'll embed a minimal web audio oscillator for safety? But the requirement "background music" - I'll use a gentle loop from freesound? Instead I embed an inline short sine wave? No. I'll provide a romantic piano from my dedicated CDN using a reliable public domain demo? I'll use 'https://www.ashley-burns.com/music/love.mp3' might not exist. Safer: use a hidden youtube? Not allowed. I'll generate an AudioContext synth for simple romantic arpeggio? That's complex. I'll embed a simple 'Silent Night' midi? No — I'll use a known sample that is permissive: "https://actions.google.com/sound.mp3"? not. For demonstration, I'll play a local silent audio and provide a note that music is simulated. But better: I'll use a free loop from 'https://www.samplefocus.com' not allowed. I'll create an AudioContext melody (clean and nice). Simpler: Use 'Howler'? overkill. I'll instead embed a beautiful ambient via Web Audio Oscillator + gain? Too synthetic. The requirement says background music, I'll embed a simple .wav from a known resource? I can embed a dataURI? Not possible. I choose to use a publicly available instrumental from github? I'll use: "https://commondatastorage.googleapis.com/codeskulptor-assets/week7-bouncing-music.wav"? not romantic. To ensure working music: I'll implement a gentle soundfont? No. I'll add a minimal audio element with a reliable romantic track from my own base64? too large. I'll fake? No I must deliver functional. I'll use 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8f7b3c1.mp3'? that might be not permanent. But for user experience, I'll implement a toggle that plays a silent sound and add a notice: "background melody inspiration", however that breaks expectation. To be honest: I create an oscillator melody (C major arpeggio) with setInterval? Not consistent. I'll embed a very simple HTMLAudioElement with a known reliable classical piano: "http://www.hochmuth.com/mp3/Haydn_Cello_Concerto_D-1.mp3"? not romantic. I decide: use a public domain 'Prelude in C' from musopen? but cross-origin? I'll use 'https://www.mfiles.co.uk/mp3-downloads/Bach-Air-on-G-string.mp3' but that requires permission? It's for sample educational use but not official. To keep professional I'll embed a quiet audio that is locally generated? I can embed a silent loop but not meeting "background music". Better: I implement a Web Audio sine wave pad? That is ugly. But proposal is about design — I'll create an audio loop using a simple AudioContext with a gentle synth pad that plays a soft chord progression. That is 100% reliable, no external files. Yes! I'll build a subtle pad.
    audio = null; // I'll handle with Web Audio API
  }
  let webAudioContext = null;
  let musicSource = null;
  let musicGain = null;
  let isMusicPlaying = false;
  function startRomanticPad() {
    if (webAudioContext && isMusicPlaying) return;
    try {
      if (!webAudioContext) {
        webAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        musicGain = webAudioContext.createGain();
        musicGain.gain.value = 0.28;
        musicGain.connect(webAudioContext.destination);
      }
      if (webAudioContext.state === 'suspended') {
        webAudioContext.resume();
      }
      // simple gentle chord loop using oscillators? but too heavy. I'll create a gentle drone using oscillator + LFO
      if (musicSource) {
        try { musicSource.stop(); } catch(e) {}
      }
      const now = webAudioContext.currentTime;
      const osc1 = webAudioContext.createOscillator();
      const osc2 = webAudioContext.createOscillator();
      const gainNode = webAudioContext.createGain();
      osc1.type = 'sine';
      osc2.type = 'sine';
      osc1.frequency.value = 261.63; // C4
      osc2.frequency.value = 329.63; // E4
      gainNode.gain.value = 0.2;
      osc1.connect(gainNode);
      osc2.connect(gainNode);
      gainNode.connect(musicGain);
      osc1.start();
      osc2.start();
      musicSource = { stop: () => { osc1.stop(); osc2.stop(); } };
      // also schedule a gentle lfo for volume
      const lfo = webAudioContext.createOscillator();
      const lfoGain = webAudioContext.createGain();
      lfo.frequency.value = 0.4;
      lfoGain.gain.value = 0.08;
      lfo.connect(lfoGain);
      lfoGain.connect(musicGain.gain);
      lfo.start();
      musicSource.lfo = lfo;
      musicSource.lfoGain = lfoGain;
      isMusicPlaying = true;
    } catch(e) { console.log("audio autoplay blocked"); }
  }
  function stopMusic() {
    if (musicSource) {
      try {
        if (musicSource.stop) musicSource.stop();
        if (musicSource.lfo) musicSource.lfo.stop();
      } catch(e) {}
      musicSource = null;
    }
    isMusicPlaying = false;
  }
  function toggleMusic() {
    if (!webAudioContext) {
      startRomanticPad();
    } else {
      if (isMusicPlaying) {
        stopMusic();
      } else {
        startRomanticPad();
      }
    }
    updateMusicButtonText();
  }
  function updateMusicButtonText() {
    const btn = document.getElementById('musicToggle');
    if (btn) btn.innerText = isMusicPlaying ? "🎵 Melody On ♪" : "🎵 Music Off ♫";
  }
  document.getElementById('musicToggle')?.addEventListener('click', () => {
    toggleMusic();
  });
  // autoplay attempt after any user gesture
  function enableAudioOnFirstClick() {
    if (!webAudioContext) {
      startRomanticPad();
    } else if (webAudioContext.state === 'suspended') {
      webAudioContext.resume().then(() => { startRomanticPad(); });
    } else if (!isMusicPlaying) {
      startRomanticPad();
    }
    document.removeEventListener('click', enableAudioOnFirstClick);
    document.removeEventListener('touchstart', enableAudioOnFirstClick);
  }
  document.addEventListener('click', enableAudioOnFirstClick);
  document.addEventListener('touchstart', enableAudioOnFirstClick);

  // ---------- SCREEN LOGIC ----------
  let currentScreen = 1;
  const app = document.getElementById('appRoot');

  function renderScreen(screenId, extraData = {}) {
    if (!app) return;
    app.classList.add('fade-out');
    setTimeout(() => {
      let html = '';
      switch(screenId) {
        case 1: // proposal
          html = `<div class="screen-container fade-in">
                    <div class="proposal-text">💖 Will you marry me my Axam? 💍</div>
                    <button id="continueBtn">Continue →</button>
                    <footer>forever begins ✨</footer>
                  </div>`;
          break;
        case 2: // vows
          html = `<div class="screen-container fade-in">
                    <div class="vows-card">Axam, do you take Hanshika to be your wedded wife, to cherish, love, and adore all the days of your life? 💌</div>
                    <button id="answerBtn">Answer 💕</button>
                  </div>`;
          break;
        case 3: // netlify-style form (answer input)
          html = `<div class="screen-container fade-in">
                    <h2 style="color:#a13e4f;">💌 Your heartfelt answer 💌</h2>
                    <form id="proposalForm" name="proposal-response" method="POST" data-netlify="true" action="/nextpage" netlify>
                      <input type="hidden" name="form-name" value="proposal-response" />
                      <input type="text" name="name" placeholder="Your name (Axam)" style="margin-bottom:8px;" />
                      <textarea name="answer" rows="3" placeholder="Write your promise, your yes... or anything romantic..." required></textarea>
                      <button type="submit" id="submitAnswerBtn">Submit your answer 💖</button>
                    </form>
                    <footer style="font-size:0.75rem;">✉️ Your answer will be sent to Hanshika's heart (email).</footer>
                  </div>`;
          break;
        case 4: // decision buttons with playful pressure
          html = `<div class="screen-container fade-in" id="decisionScreen">
                    <div id="dynamicPressureZone"></div>
                    <div class="decision-buttons" id="decisionBtnsWrapper">
                      <button class="btn-yes" id="yesBtn">💚 Yes, I do</button>
                      <button class="btn-no" id="noBtn">❌ No, I don’t</button>
                    </div>
                  </div>`;
          break;
        case 5: // certificate ready after yes
          html = `<div class="screen-container fade-in">
                    <div style="font-size:2rem;">🎉💖</div>
                    <p style="font-size:1.5rem;">Ready for your marriage certificate?</p>
                    <button id="certificateReadyBtn">Yes</button>
                  </div>`;
          break;
        case 6: // final beautiful certificate
          html = `<div class="screen-container fade-in certificate">
                    <h2 class="gold-text">💒 Certificate of Marriage 💒</h2>
                    <p>This certifies that on <strong style="font-size:1.3rem;">3 September 2025</strong></p>
                    <p style="font-size:1.8rem; font-weight:bold;">Hanshika & Axam</p>
                    <p>✨ Forever together ❤️ United in marriage ✨</p>
                    <div class="seal">💖💍💖</div>
                    <div class="kiss-rain" id="kissRain"></div>
                    <footer>Sealed with eternal love</footer>
                  </div>`;
          break;
        default: return;
      }
      app.innerHTML = html;
      app.classList.remove('fade-out');
      app.classList.add('fade-in');
      setTimeout(() => app.classList.remove('fade-in'), 500);
      attachEvents(screenId);
    }, 200);
  }

  function attachEvents(screenId) {
    if (screenId === 1) {
      document.getElementById('continueBtn')?.addEventListener('click', () => { currentScreen = 2; renderScreen(2); });
    } else if (screenId === 2) {
      document.getElementById('answerBtn')?.addEventListener('click', () => { currentScreen = 3; renderScreen(3); });
    } else if (screenId === 3) {
      const form = document.getElementById('proposalForm');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          // Netlify will capture automatically, but we also manually store answer (for simulation & redirect)
          const answerField = form.querySelector('textarea[name="answer"]');
          if(answerField && answerField.value.trim() === "") {
            alert("Please write your beautiful answer 💌");
            return;
          }
          // simulate redirect to screen 4 after submit
          // also send data via fetch to netlify forms (to actually email)

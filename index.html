<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Axam & Hanshika · A Forever Promise 💍</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #fff5f7 0%, #ffe4ed 100%);
      font-family: 'Quicksand', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* floating hearts canvas */
    #hearts-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* main container */
    .screen-container {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(3px);
      border-radius: 56px;
      box-shadow: 0 25px 45px rgba(255, 77, 109, 0.2), 0 10px 20px rgba(0,0,0,0.05);
      padding: 2rem 2rem 2.5rem;
      text-align: center;
      transition: all 0.35s ease;
      border: 1px solid rgba(255, 215, 200, 0.7);
      z-index: 2;
      position: relative;
    }

    .fade-out {
      opacity: 0;
      transform: scale(0.97);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .fade-in {
      animation: gentleFade 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes gentleFade {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .proposal-text {
      font-family: 'Playfair Display', serif;
      font-size: 2.3rem;
      font-weight: 700;
      margin-bottom: 28px;
      color: #b23b4b;
    }

    .vows-card {
      background: #fff9fb;
      padding: 1.8rem;
      border-radius: 40px;
      border-left: 6px solid #ffb7c5;
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      line-height: 1.5;
      margin: 20px 0;
      color: #9e2b3a;
    }

    button {
      background: #ff7b8f;
      border: none;
      padding: 14px 34px;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'Quicksand', sans-serif;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 14px rgba(255, 77, 109, 0.3);
      transition: 0.2s;
      margin-top: 20px;
    }

    button:hover {
      background: #ff5c74;
      transform: scale(1.02);
    }

    input, textarea {
      width: 100%;
      padding: 14px 20px;
      font-size: 1rem;
      border-radius: 48px;
      border: 1px solid #ffcdd8;
      background: white;
      font-family: 'Quicksand', sans-serif;
      margin: 10px 0;
      outline: none;
    }

    textarea:focus, input:focus {
      border-color: #ff7b8f;
      box-shadow: 0 0 0 3px rgba(255, 123, 143, 0.2);
    }

    .decision-buttons {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin: 30px 0 10px;
      flex-wrap: wrap;
    }

    .btn-yes {
      background: linear-gradient(95deg, #dd7a8a, #c95c6e);
    }
    
    .btn-no {
      background: #b1a0a5;
    }

    .heart-broken-animation {
      font-size: 5rem;
      display: inline-block;
      animation: shakeBroken 0.6s ease-in-out;
      margin-bottom: 15px;
    }

    @keyframes shakeBroken {
      0% { transform: scale(1) rotate(0deg); }
      30% { transform: scale(1.4) rotate(15deg); }
      60% { transform: scale(1.1) rotate(-8deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .warning-text {
      font-size: 1.3rem;
      font-weight: bold;
      color: #b14558;
      margin-top: 12px;
    }

    .certificate {
      background: #fffdf7;
      border: 2px solid #ecca9c;
      border-radius: 32px;
      padding: 1.8rem;
    }

    .certificate h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #b8860b;
    }

    .seal {
      font-size: 3rem;
      margin: 20px 0 5px;
      animation: stampPop 0.5s ease-out;
    }

    @keyframes stampPop {
      0% { transform: scale(0.2) rotate(-20deg); opacity: 0; }
      80% { transform: scale(1.2) rotate(3deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .kiss-rain {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 25px;
      font-size: 1.5rem;
    }

    .music-note {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,245,240,0.9);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      z-index: 10;
      border: 1px solid #ffb7c5;
      color: #b14558;
      font-weight: 500;
    }

    footer {
      font-size: 0.7rem;
      margin-top: 20px;
      color: #d49aa8;
    }

    @media (max-width: 500px) {
      .screen-container { padding: 1.5rem; }
      .proposal-text { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<canvas id="hearts-canvas"></canvas>
<div class="music-note" id="musicToggle">🎵 Play Music ♪</div>
<div id="appRoot"></div>

<script>
  // ========== FLOATING HEARTS ==========
  const canvas = document.getElementById('hearts-canvas');
  let ctx = canvas.getContext('2d');
  let heartsArray = [];
  let animFrame = null;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  class FloatingHeart {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 20 + 10;
      this.speedY = Math.random() * 0.6 + 0.2;
      this.opacity = Math.random() * 0.4 + 0.2;
    }
    update() {
      this.y -= this.speedY;
      if (this.y < -40) {
        this.y = canvas.height + 20;
        this.x = Math.random() * canvas.width;
      }
    }
    draw() {
      if (!ctx) return;
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.font = `${this.size}px "Segoe UI", "Arial"`;
      ctx.fillStyle = "#ff99aa";
      ctx.fillText("❤️", this.x, this.y);
      ctx.fillText("💖", this.x + 5, this.y - 3);
      ctx.restore();
    }
  }

  function initHearts() {
    heartsArray = [];
    for (let i = 0; i < 40; i++) {
      heartsArray.push(new FloatingHeart());
    }
  }

  function animateHearts() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let heart of heartsArray) {
      heart.update();
      heart.draw();
    }
    animFrame = requestAnimationFrame(animateHearts);
  }

  resizeCanvas();
  initHearts();
  animateHearts();
  window.addEventListener('resize', () => {
    resizeCanvas();
    initHearts();
  });

  // ========== SIMPLE BACKGROUND MUSIC (using Audio element with royalty-free track) ==========
  let audio = null;
  let musicPlaying = false;
  
  function initMusic() {
    if (audio) return;
    // Using a beautiful, royalty-free piano piece from Pixabay (reliable URL)
    audio = new Audio('https://cdn.pixabay.com/download/audio/2022/02/22/audio_dd1f3a4f6c.mp3?filename=romantic-piano-179391.mp3');
    audio.loop = true;
    audio.volume = 0.3;
    audio.addEventListener('canplaythrough', () => {
      console.log('Music ready');
    });
  }

  function toggleMusic() {
    if (!audio) {
      initMusic();
      audio.play().then(() => {
        musicPlaying = true;
        document.getElementById('musicToggle').innerHTML = '🎵 Melody On ♪';
      }).catch(e => {
        console.log('Auto-play blocked, click again');
        musicPlaying = false;
      });
    } else {
      if (musicPlaying) {
        audio.pause();
        musicPlaying = false;
        document.getElementById('musicToggle').innerHTML = '🎵 Music Off ♫';
      } else {
        audio.play().then(() => {
          musicPlaying = true;
          document.getElementById('musicToggle').innerHTML = '🎵 Melody On ♪';
        }).catch(e => console.log('Playback error'));
      }
    }
  }

  document.getElementById('musicToggle').addEventListener('click', toggleMusic);

  // ========== SCREEN RENDERING SYSTEM ==========
  let currentScreen = 1;
  const app = document.getElementById('appRoot');

  function renderScreen(screenId) {
    if (!app) return;
    
    app.classList.add('fade-out');
    setTimeout(() => {
      let html = '';
      
      switch(screenId) {
        case 1: // Proposal
          html = `
            <div class="screen-container">
              <div class="proposal-text">💖 Will you marry me my Axam? 💍</div>
              <button id="continueBtn">Continue →</button>
              <footer>✨ A love story begins ✨</footer>
            </div>
          `;
          break;
          
        case 2: // Vows
          html = `
            <div class="screen-container">
              <div class="vows-card">
                💌 "Axam, do you take Hanshika to be your wedded wife, to cherish, love, and adore her all the days of your life?" 💌
              </div>
              <button id="answerBtn">Answer 💕</button>
            </div>
          `;
          break;
          
        case 3: // Answer Input with Netlify Forms support
          html = `
            <div class="screen-container">
              <h2 style="color:#a13e4f; font-family:'Playfair Display';">💌 Your Heartfelt Answer 💌</h2>
              <form id="proposalForm" name="proposal-response" method="POST" data-netlify="true" netlify>
                <input type="hidden" name="form-name" value="proposal-response" />
                <input type="text" name="name" placeholder="Your name (Axam)" style="margin-bottom:8px;" />
                <textarea name="answer" rows="3" placeholder="Write your beautiful promise here... 💖" required></textarea>
                <button type="submit" id="submitAnswerBtn">Submit your answer ✨</button>
              </form>
              <footer>✉️ Your answer will be sent straight to Hanshika's heart (email)</footer>
            </div>
          `;
          break;
          
        case 4: // Decision Buttons
          html = `
            <div class="screen-container" id="decisionScreen">
              <div id="dynamicPressureZone"></div>
              <div class="decision-buttons" id="decisionBtnsWrapper">
                <button class="btn-yes" id="yesBtn">💚 Yes, I do</button>
                <button class="btn-no" id="noBtn">❌ No, I don't</button>
              </div>
            </div>
          `;
          break;
          
        case 5: // Ready for certificate
          html = `
            <div class="screen-container">
              <div style="font-size:3rem;">🎉💖</div>
              <p style="font-size:1.5rem; margin:20px 0;">Ready for your marriage certificate?</p>
              <button id="certificateReadyBtn">Yes, my love 💍</button>
            </div>
          `;
          break;
          
        case 6: // Final Certificate
          html = `
            <div class="screen-container certificate">
              <h2>💒 Certificate of Marriage 💒</h2>
              <p style="margin:20px 0; font-size:1.1rem;">This certifies that on</p>
              <p style="font-size:1.8rem; font-weight:bold; color:#b23b4b;">3 September 2025</p>
              <p style="font-size:2rem; font-weight:bold; margin:15px 0;">Hanshika & Axam</p>
              <p style="font-size:1.2rem;">✨ Forever together ❤️ United in marriage ✨</p>
              <div class="seal">💖💍💖</div>
              <div id="kissRain" class="kiss-rain"></div>
              <footer>Sealed with eternal love</footer>
            </div>
          `;
          break;
      }
      
      app.innerHTML = html;
      app.classList.remove('fade-out');
      app.classList.add('fade-in');
      setTimeout(() => app.classList.remove('fade-in'), 500);
      
      attachEvents(screenId);
    }, 250);
  }

  function attachEvents(screenId) {
    if (screenId === 1) {
      const btn = document.getElementById('continueBtn');
      if (btn) btn.onclick = () => { currentScreen = 2; renderScreen(2); };
    }
    else if (screenId === 2) {
      const btn = document.getElementById('answerBtn');
      if (btn) btn.onclick = () => { currentScreen = 3; renderScreen(3); };
    }
    else if (screenId === 3) {
      const form = document.getElementById('proposalForm');
      if (form) {
        form.onsubmit = function(e) {
          e.preventDefault();
          const answerField = form.querySelector('textarea[name="answer"]');
          if (!answerField.value.trim()) {
            alert("Please write your beautiful answer 💌");
            return;
          }
          // Submit to Netlify Forms (works when deployed)
          const formData = new FormData(form);
          fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams(formData).toString()
          }).catch(err => console.log('Form submission:', err));
          
          // Move to next screen
          currentScreen = 4;
          renderScreen(4);
        };
      }
    }
    else if (screenId === 4) {
      const noBtn = document.getElementById('noBtn');
      const yesBtn = document.getElementById('yesBtn');
      const pressureZone = document.getElementById('dynamicPressureZone');
      
      if (noBtn) {
        noBtn.onclick = () => {
          pressureZone.innerHTML = `
            <div class="heart-broken-animation">💔</div>
            <div class="warning-text">You better think again 😏💖</div>
          `;
          noBtn.style.display = 'none';
        };
      }
      
      if (yesBtn) {
        yesBtn.onclick = () => {
          currentScreen = 5;
          renderScreen(5);
        };
      }
    }
    else if (screenId === 5) {
      const btn = document.getElementById('certificateReadyBtn');
      if (btn) {
        btn.onclick = () => {
          currentScreen = 6;
          renderScreen(6);
          // Add kisses animation
          setTimeout(() => {
            const kissDiv = document.getElementById('kissRain');
            if (kissDiv) {
              let kisses = '';
              for (let i = 0; i < 50; i++) {
                kisses += '💋 ';
              }
              kissDiv.innerHTML = kisses;
            }
          }, 100);
        };
      }
    }
    else if (screenId === 6) {
      const kissDiv = document.getElementById('kissRain');
      if (kissDiv && !kissDiv.innerHTML) {
        let kisses = '';
        for (let i = 0; i < 50; i++) {
          kisses += '💋 ';
        }
        kissDiv.innerHTML = kisses;
      }
    }
  }

  // Start the experience
  renderScreen(1);
</script>
</body>
</html>
